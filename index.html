<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizPDF | تحويل الدرس إلى QCM</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-top">
        <span class="brand">QuizPDF</span>
        <div class="lang-note">العربية + Français</div>
      </div>
      <h1 id="title">حوّل الدرس إلى أسئلة QCM عالية الجودة</h1>
      <p id="subtitle">ارفع ملف PDF، اختر اللغة، وحدّد عدد الأسئلة للحصول على اختبار احترافي يساعدك على الحفظ والمراجعة.</p>
    </header>

    <section class="card uploader">
      <form id="uploadForm">
        <div class="grid-two">
          <label class="field">
            <span id="pdfLabel">ملف الدرس (PDF)</span>
            <input type="file" name="pdf" accept="application/pdf" required />
          </label>

          <label class="field">
            <span id="langLabel">لغة الأسئلة</span>
            <select name="language" id="languageSelect">
              <option value="ar">العربية</option>
              <option value="fr">Français</option>
            </select>
          </label>
        </div>

        <div class="grid-two">
          <label class="field">
            <span id="countLabel">عدد الأسئلة</span>
            <input type="number" name="question_count" min="5" max="25" value="10" />
          </label>

          <label class="field">
            <span id="qualityLabel">مستوى الإخراج</span>
            <input type="text" value="QCM عالي الجودة مع تفسير" disabled />
          </label>
        </div>

        <button type="submit" id="submitBtn">إنشاء الأسئلة</button>
      </form>
      <div id="status" class="status"></div>
    </section>

    <section id="results" class="results hidden">
      <div class="results-header">
        <h2 id="quizTitle">الأسئلة</h2>
        <button id="toggleAnswersBtn" class="secondary" type="button">إظهار / إخفاء الإجابات</button>
      </div>
      <div id="questionsList"></div>
    </section>
  </div>

  <script>
    const copy = {
      ar: {
        pageLang: 'ar',
        dir: 'rtl',
        title: 'حوّل الدرس إلى أسئلة QCM عالية الجودة',
        subtitle: 'ارفع ملف PDF، اختر اللغة، وحدّد عدد الأسئلة للحصول على اختبار احترافي يساعدك على الحفظ والمراجعة.',
        pdfLabel: 'ملف الدرس (PDF)',
        langLabel: 'لغة الأسئلة',
        countLabel: 'عدد الأسئلة',
        qualityLabel: 'مستوى الإخراج',
        qualityValue: 'QCM عالي الجودة مع تفسير',
        submitBtn: 'إنشاء الأسئلة',
        statusLoading: 'جارٍ استخراج النص وإنشاء الأسئلة...',
        statusSuccess: 'تم إنشاء الأسئلة بنجاح.',
        defaultQuizTitle: 'الأسئلة',
        toggleBtn: 'إظهار / إخفاء الإجابات',
        questionWord: 'سؤال',
        correctAnswer: 'الإجابة الصحيحة:',
        explanation: 'التفسير:',
      },
      fr: {
        pageLang: 'fr',
        dir: 'ltr',
        title: 'Transformez votre cours en QCM de haute qualité',
        subtitle: 'Téléversez un PDF, choisissez la langue et générez un quiz professionnel pour mémoriser et réviser.',
        pdfLabel: 'Fichier du cours (PDF)',
        langLabel: 'Langue des questions',
        countLabel: 'Nombre de questions',
        qualityLabel: 'Niveau de sortie',
        qualityValue: 'QCM premium avec explication',
        submitBtn: 'Générer les questions',
        statusLoading: 'Extraction du texte et génération des questions...',
        statusSuccess: 'Questions générées avec succès.',
        defaultQuizTitle: 'Questions',
        toggleBtn: 'Afficher / Masquer les réponses',
        questionWord: 'Question',
        correctAnswer: 'Bonne réponse :',
        explanation: 'Explication :',
      }
    };

    const form = document.getElementById('uploadForm');
    const statusBox = document.getElementById('status');
    const resultsSection = document.getElementById('results');
    const questionsList = document.getElementById('questionsList');
    const quizTitle = document.getElementById('quizTitle');
    const toggleAnswersBtn = document.getElementById('toggleAnswersBtn');
    const languageSelect = document.getElementById('languageSelect');
    const qualityInput = document.querySelector('input[disabled]');

    let answersVisible = false;
    let currentLang = languageSelect.value;

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }

    function applyLanguage(lang) {
      currentLang = copy[lang] ? lang : 'ar';
      const t = copy[currentLang];
      document.documentElement.lang = t.pageLang;
      document.documentElement.dir = t.dir;
      document.body.classList.toggle('ltr', t.dir === 'ltr');
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('pdfLabel').textContent = t.pdfLabel;
      document.getElementById('langLabel').textContent = t.langLabel;
      document.getElementById('countLabel').textContent = t.countLabel;
      document.getElementById('qualityLabel').textContent = t.qualityLabel;
      qualityInput.value = t.qualityValue;
      document.getElementById('submitBtn').textContent = t.submitBtn;
      toggleAnswersBtn.textContent = t.toggleBtn;
    }

    function renderQuestions(data) {
      const t = copy[currentLang];
      quizTitle.textContent = data.title || t.defaultQuizTitle;
      questionsList.innerHTML = '';

      data.questions.forEach((q, index) => {
        const item = document.createElement('article');
        item.className = 'question-card';

        item.innerHTML = `
          <div class="question-top">
            <span class="badge">${escapeHtml(t.questionWord)} ${index + 1}</span>
            <span class="difficulty ${q.difficulty}">${escapeHtml(q.difficulty || 'medium')}</span>
          </div>
          <h3>${escapeHtml(q.question)}</h3>
          <div class="choices">
            ${q.choices.map((choice, i) => `
              <label class="choice" data-correct="${i === q.correct_index ? '1' : '0'}">
                <input type="radio" name="q_${index}" />
                <span>${escapeHtml(choice)}</span>
              </label>
            `).join('')}
          </div>
          <div class="answer-box ${answersVisible ? '' : 'hidden'}">
            <strong>${escapeHtml(t.correctAnswer)}</strong> ${escapeHtml(q.choices[q.correct_index])}<br />
            <strong>${escapeHtml(t.explanation)}</strong> ${escapeHtml(q.explanation)}
          </div>
        `;

        questionsList.appendChild(item);
      });

      resultsSection.classList.remove('hidden');
    }

    toggleAnswersBtn.addEventListener('click', () => {
      answersVisible = !answersVisible;
      document.querySelectorAll('.answer-box').forEach(el => el.classList.toggle('hidden', !answersVisible));
      document.querySelectorAll('.choice').forEach(el => {
        const isCorrect = el.dataset.correct === '1';
        el.classList.toggle('correct', answersVisible && isCorrect);
      });
    });

    languageSelect.addEventListener('change', () => applyLanguage(languageSelect.value));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const t = copy[currentLang];
      statusBox.textContent = t.statusLoading;
      statusBox.className = 'status';
      resultsSection.classList.add('hidden');

      const formData = new FormData(form);

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          body: formData,
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unexpected error');
        }

        currentLang = data.language || languageSelect.value || currentLang;
        applyLanguage(currentLang);
        statusBox.textContent = copy[currentLang].statusSuccess;
        statusBox.className = 'status success';
        answersVisible = false;
        renderQuestions(data);
      } catch (error) {
        statusBox.textContent = error.message;
        statusBox.className = 'status error';
      }
    });

    applyLanguage(currentLang);
  </script>
</body>
</html>
